<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KONTAKT — OSHEE ALL STAR FESTIVAL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Forum&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #0A0C0F;
      --citrine: #EED410;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Forum', serif;
      background: var(--black);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      text-align: center;
    }
    h1 {
      font-family: 'Anton', sans-serif;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--citrine);
      margin-bottom: 1rem;
    }
    .divider {
      width: 60px;
      height: 4px;
      background: var(--citrine);
      margin: 0 auto 2rem;
    }
    .label {
      font-family: 'Anton', sans-serif;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.4);
      margin-bottom: 0.75rem;
    }
    .email {
      font-family: 'Forum', serif;
      font-size: clamp(1.3rem, 3vw, 1.8rem);
      color: #fff;
      text-decoration: none;
      border-bottom: 2px solid var(--citrine);
      padding-bottom: 0.2rem;
      transition: color 0.2s;
    }
    .email:hover { color: var(--citrine); }
    .back-link {
      font-family: 'Anton', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #fff;
      text-decoration: none;
      border: 2px solid rgba(255,255,255,0.3);
      padding: 0.6rem 1.5rem;
      margin-top: 3.5rem;
      display: inline-block;
      transition: border-color 0.2s, color 0.2s;
    }
    .back-link:hover { border-color: var(--citrine); color: var(--citrine); }
  </style>
</head>
<body>
  <h1>KONTAKT</h1>
  <div class="divider"></div>
  <p class="label">NAPISZ DO NAS</p>
  <a href="mailto:kontakt@allstarfestival.pl" class="email">kontakt@allstarfestival.pl</a>
  <a href="index.html" class="back-link">POWRÓT</a>
</body>
</html>
