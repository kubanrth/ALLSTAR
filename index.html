<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OSHEE ALL STAR FESTIVAL</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:wght@400;600;700;800;900&family=Forum&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'KTF Rublena';
      src: url('brand_assets/KTFRublenaTrial-Solid.otf') format('opentype');
      font-weight: 400 900;
      font-display: swap;
    }

    :root {
      --black: #0A0C0F;
      --citrine: #EED410;
      --white: #FFFFFF;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      overflow-x: hidden;
      max-width: 100%;
    }

    body {
      font-family: 'Forum', serif;
      background: var(--black);
      color: var(--black);
    }

    /* ── Barrel containers ── */
    .barrel {
      border: 4px solid var(--black);
      border-radius: 0;
      overflow: hidden;
      max-width: 1120px;
      margin: 2.5rem auto;
      background: var(--citrine);
      position: relative;
    }

    /* ── White inner card ── */
    .white-card {
      background: #fff;
      border-radius: 24px;
      overflow: hidden;
      max-width: 1120px;
      margin: 2.5rem auto;
    }

    /* ── Section label style ── */
    .section-label {
      font-family: 'Anton', sans-serif;
      font-weight: 900;
      font-size: 1.5rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--black);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .section-label::before {
      content: '';
      display: block;
      width: 40px;
      height: 4px;
      background: var(--citrine);
      flex-shrink: 0;
    }
    .section-label-dark::before {
      background: #fff;
    }
    .section-label-white {
      font-family: 'Anton', sans-serif;
      font-weight: 900;
      font-size: 1.5rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .section-label-white::before {
      content: '';
      display: block;
      width: 40px;
      height: 4px;
      background: var(--citrine);
      flex-shrink: 0;
    }

    /* ── Buttons ── */
    .btn-white-outline {
      font-family: 'Anton', sans-serif;
      font-weight: 800;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.65rem 1.75rem;
      border: 2px solid #fff;
      background: transparent;
      color: #fff;
      text-decoration: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    .btn-white-outline:hover { background: #fff; color: var(--black); }

    .btn-black {
      font-family: 'Anton', sans-serif;
      font-weight: 800;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.85rem 2.75rem;
      background: var(--black);
      color: var(--citrine);
      border: none;
      text-decoration: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-black:hover { opacity: 0.85; }
    .btn-black:active { transform: scale(0.97); }

    .btn-black-outline {
      font-family: 'Anton', sans-serif;
      font-weight: 800;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.85rem 2.75rem;
      background: var(--black);
      color: var(--citrine);
      border: 2px solid var(--black);
      text-decoration: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    .btn-black-outline:hover { background: transparent; color: var(--black); }

    /* ── Social icons ── */
    .social-icon-yellow {
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 50%;
      background: var(--citrine);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.15s;
    }
    .social-icon-yellow svg { fill: var(--black); width: 1rem; height: 1rem; display: block; }
    .social-icon-yellow:hover { background: #fff; transform: scale(1.1); }

    .social-icon-dark {
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 50%;
      background: var(--black);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.15s;
    }
    .social-icon-dark svg { fill: var(--citrine); width: 1rem; height: 1rem; display: block; }
    .social-icon-dark:hover { background: #333; transform: scale(1.1); }

    /* ── Countdown numbers ── */
    .cd-num {
      font-family: 'Anton', sans-serif;
      font-weight: 900;
      font-size: clamp(1.8rem, 3vw, 2.8rem);
      line-height: 1;
      color: var(--black);
      letter-spacing: -0.02em;
    }
    .cd-label {
      font-family: 'Anton', sans-serif;
      font-weight: 700;
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--black);
      opacity: 0.7;
      margin-top: 0.25rem;
    }
    .cd-sep {
      font-family: 'Anton', sans-serif;
      font-weight: 900;
      font-size: clamp(1.5rem, 2.5vw, 2.4rem);
      line-height: 1;
      color: var(--black);
      opacity: 0.4;
      padding-bottom: 1.5rem;
    }

    /* ── Artist cards ── */
    .artist-card {
      flex-shrink: 0;
      width: 220px;
      height: 290px;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .artist-card:hover { transform: scale(1.03); }
    .artist-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .artist-card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 50%);
    }
    .artist-card-info {
      position: absolute;
      bottom: 0.75rem;
      left: 0.75rem;
    }
    .artist-card-num {
      font-family: 'Anton', sans-serif;
      font-weight: 600;
      font-size: 0.65rem;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.1em;
    }
    .artist-card-name {
      font-family: 'Anton', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    /* ── Artist announce overlay ── */
    .artist-announce {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: 'Anton', sans-serif;
      font-weight: 900;
      font-size: 1.1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #fff;
      line-height: 1.3;
    }

    /* ── News cards ── */
    .news-card { background: #fff; }
    .news-mosaic {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      aspect-ratio: 1;
    }
    .news-mosaic img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* ── Strefy cards ── */
    .strefa-card {
      flex: 1;
      min-width: 0;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      height: 380px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .strefa-card:hover { transform: scale(1.02); }
    .strefa-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .strefa-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 55%);
    }
    .strefa-info {
      position: absolute;
      bottom: 1.25rem;
      left: 1.25rem;
    }
    .strefa-num {
      font-family: 'Anton', sans-serif;
      font-weight: 600;
      font-size: 0.65rem;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.1em;
    }
    .strefa-name {
      font-family: 'Anton', sans-serif;
      font-weight: 800;
      font-size: 1.15rem;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ── FAQ ── */
    .faq-item {
      background: #E0E0E0;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 0.5rem;
    }
    .faq-question {
      font-family: 'Anton', sans-serif;
      font-weight: 700;
      font-size: 1.25rem;
      color: var(--black);
      padding: 1.2rem 1.5rem;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
    }
    .faq-answer {
      font-family: 'Anton', sans-serif;
      font-size: 1.1rem;
      color: #444;
      padding: 0 1.5rem;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease, padding 0.35s ease;
      line-height: 1.7;
    }
    .faq-item.open .faq-answer {
      max-height: 300px;
      padding: 0 1.5rem 1.2rem;
    }
    .faq-chevron {
      transition: transform 0.3s;
      flex-shrink: 0;
    }
    .faq-item.open .faq-chevron { transform: rotate(180deg); }

    /* ── Ticket tier list ── */
    .ticket-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.4rem 2.5rem;
      border-bottom: 1px solid rgba(10,12,15,0.2);
    }
    .ticket-row:last-child { border-bottom: none; }
    .ticket-name {
      font-family: 'Anton', sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: var(--black);
    }
    .ticket-status {
      font-family: 'Forum', serif;
      font-size: 0.9rem;
      color: var(--black);
      opacity: 0.7;
    }
    .ticket-countdown {
      font-family: 'Anton', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--black);
      letter-spacing: 0.05em;
    }

    /* ── Lineup grid ── */
    .lineup-name {
      font-family: 'Anton', sans-serif;
      font-weight: 900;
      font-size: clamp(2rem, 4vw, 3.5rem);
      text-transform: uppercase;
      color: var(--black);
      letter-spacing: -0.01em;
      line-height: 1.1;
    }
    .lineup-num {
      font-family: 'Anton', sans-serif;
      font-weight: 600;
      font-size: 1.1rem;
      color: var(--black);
      opacity: 0.55;
      vertical-align: baseline;
      margin-right: 0.15em;
    }

    /* ── Partner logo boxes ── */
    .partner-box:empty { display: none; }
    .partner-box {
      flex: 1;
      border: none;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      min-width: 0;
    }
    .partner-box img { max-width: 100%; max-height: 100%; object-fit: contain; }

    /* ── Instagram photos ── */
    .insta-photo {
      flex: 1;
      aspect-ratio: 1;
      overflow: hidden;
      min-width: 0;
    }
    .insta-photo img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s; }
    .insta-photo:hover img { transform: scale(1.05); }

    /* ── Horizontal scroll ── */
    .h-scroll {
      display: flex;
      gap: 1rem;
      overflow-x: auto;
      padding-bottom: 0.5rem;
      scrollbar-width: none;
    }
    .h-scroll::-webkit-scrollbar { display: none; }

    /* ── Footer nav ── */
    .footer-nav-link {
      font-family: 'Anton', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--black);
      text-decoration: none;
      display: block;
      padding: 0.35rem 0;
      transition: opacity 0.2s;
    }
    .footer-nav-link:hover { opacity: 0.5; }

    /* ── Hamburger Menu ── */
    .hamburger-btn {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 10001;
      width: 44px;
      height: 44px;
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 6px;
      padding: 0;
    }
    .hamburger-btn span {
      display: block;
      width: 28px;
      height: 3px;
      background: #fff;
      transition: transform 0.3s, opacity 0.3s;
    }
    .hamburger-btn.open span:nth-child(1) { transform: translateY(9px) rotate(45deg); }
    .hamburger-btn.open span:nth-child(2) { opacity: 0; }
    .hamburger-btn.open span:nth-child(3) { transform: translateY(-9px) rotate(-45deg); }

    .menu-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .menu-backdrop.open { opacity: 1; pointer-events: all; }

    .menu-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 320px;
      height: 100vh;
      background: var(--black);
      z-index: 10000;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      padding: 5rem 2.5rem 2.5rem;
    }
    .menu-panel.open { transform: translateX(0); }

    .menu-panel a.menu-link {
      font-family: 'Anton', sans-serif;
      font-size: 2rem;
      text-transform: uppercase;
      color: #fff;
      text-decoration: none;
      letter-spacing: 0.06em;
      padding: 0.75rem 0;
      display: block;
      transition: color 0.2s;
    }
    .menu-panel a.menu-link:hover { color: var(--citrine); }

    body.menu-locked { overflow: hidden; }

    /* ── Desktop/Mobile toggles ── */
    .mobile-only { display: none; }
    .desktop-only { display: block; }

    /* ── Page padding for sections ── */
    .page-pad {
      padding-left: 2rem;
      padding-right: 2rem;
    }

    /* ════════════════════════════════
       MOBILE — 768px and below
    ════════════════════════════════ */
    @media (max-width: 768px) {

      /* Page padding: edge-to-edge on mobile */
      .page-pad { padding-left: 0 !important; padding-right: 0 !important; }

      /* Barrels edge-to-edge */
      .barrel { margin-left: 0 !important; margin-right: 0 !important; border-left: none !important; border-right: none !important; }
      .white-card { margin-left: 0 !important; margin-right: 0 !important; border-radius: 0 !important; }

      /* ── Header ── */
      .site-header {
        padding: 1rem 1.25rem !important;
        min-height: unset !important;
        flex-direction: column !important;
        align-items: center !important;
        gap: 0.75rem !important;
      }
      /* Logo: pull out of absolute flow, center on top */
      .header-logo-wrap {
        position: static !important;
        transform: none !important;
        order: -1 !important;
      }
      .header-logo { height: 180px !important; }
      /* Hide KUP BILET + socials on mobile */
      .site-header > a.btn-white-outline { display: none !important; }
      .site-header > div:last-child { display: none !important; }

      /* ── Barrel on mobile ── */
      .barrel { border-radius: 0 !important; margin: 0.5rem 0 !important; border: none !important; }
      .white-card { margin: 0.5rem 0 !important; }

      /* ── Prevent any overflow ── */
      img, div, section, footer { max-width: 100% !important; }

      /* ── Barrel images on mobile: full width, auto height ── */
      .barrel-img { height: auto !important; width: 100% !important; object-fit: contain !important; }
      .barrel-img-tall { height: auto !important; width: 100% !important; object-fit: contain !important; }
      .barrel-img-about { height: auto !important; width: 100% !important; object-fit: contain !important; }

      /* ── Countdown ── */
      .cd-inner { padding: 2rem 1.25rem !important; }
      .cd-star { width: 140px !important; }
      .cd-star svg { width: 140px !important; }
      .cd-num { font-size: clamp(1.6rem, 7vw, 2.8rem) !important; }
      .cd-sep { font-size: clamp(1.3rem, 5.5vw, 2.2rem) !important; }
      .cd-label { font-size: 0.55rem !important; letter-spacing: 0.05em !important; }

      /* ── About ── */
      .about-inner { padding: 2rem 1.5rem !important; }

      /* ── Tickets ── */
      .ticket-row { padding: 1rem 1.25rem !important; flex-wrap: wrap; gap: 0.2rem; }
      .ticket-name { font-size: 1.05rem !important; }
      #tickets .barrel > div { padding: 1.5rem 1.5rem 2rem !important; }
      #tickets .barrel div[style*="justify-content: space-between"] {
        flex-direction: column !important;
        align-items: flex-start !important;
        gap: 0.2rem !important;
      }
      #tickets .barrel div[style*="justify-content: space-between"] > div[style*="gap: 1rem"] {
        flex-direction: column !important;
        align-items: flex-start !important;
        gap: 0.4rem !important;
      }

      /* ── Lineup ── */
      .lineup-inner { padding: 2rem 1.5rem !important; }
      .lineup-grid { grid-template-columns: 1fr !important; gap: 0.2rem !important; }
      .lineup-name { font-size: clamp(2rem, 9vw, 3rem) !important; }
      /* MALIK MONTANA: reset span override on mobile */
      .lineup-grid .lineup-name[style*="span 2"] { grid-column: span 1 !important; text-align: left !important; }

      /* ── Artists ── */
      .artist-card { width: 170px !important; height: 220px !important; }

      /* ── News ── */
      .news-grid { grid-template-columns: 1fr !important; }
      section#news { padding: 0 1rem 2rem !important; }
      .white-card > div { padding: 1.5rem 1.5rem 2rem !important; }
      /* Show only 2 images in news mosaic on mobile (1 row × 2 cols) */
      .news-mosaic { grid-template-rows: auto !important; aspect-ratio: unset !important; height: 180px !important; }
      .news-mosaic img:nth-child(3),
      .news-mosaic img:nth-child(4) { display: none !important; }

      /* ── Partners ── */
      .partners-row { display: flex !important; flex-wrap: nowrap !important; gap: 0.75rem !important; }
      .partner-box { flex: 1 !important; max-height: unset !important; aspect-ratio: unset !important; height: 120px !important; padding: 0.5rem !important; }
      .partner-box img { max-height: 80px !important; }
      #partners .barrel > div, .page-pad .barrel > div { padding: 1.5rem 1.5rem !important; }

      /* ── Strefy ── */
      .strefy-row { flex-direction: column !important; }
      .strefa-card { flex: 0 0 180px !important; height: 180px !important; max-height: 180px !important; border-radius: 8px !important; }
      section#strefy { padding: 1.5rem 1rem !important; }

      /* ── Hide contact star decoration on mobile ── */
      .kontakt-inner > div:first-child { display: none !important; }

      /* ── Instagram ── */
      .insta-row { overflow-x: auto !important; flex-wrap: nowrap !important; scrollbar-width: none !important; }
      .insta-row::-webkit-scrollbar { display: none !important; }
      .insta-photo { flex: 0 0 160px !important; min-width: 160px !important; height: 160px !important; }
      section#instagram { padding: 0 1rem 2rem !important; }

      /* ── Kontakt ── */
      .kontakt-inner { padding: 1.5rem 1.5rem !important; overflow: visible !important; }
      .contact-grid { grid-template-columns: 1fr !important; }
      /* Remove right border on stacked contact items */
      .contact-grid > div { border-right: none !important; padding-right: 0 !important; padding-left: 0 !important; border-bottom: 1px solid rgba(10,12,15,0.15) !important; }
      .contact-grid > div:last-child { border-bottom: none !important; }

      /* ── Section labels ── */
      .section-label, .section-label-white { font-size: 1.1rem !important; }

      /* ── Desktop/Mobile toggle ── */
      .mobile-only { display: block !important; }
      .desktop-only { display: none !important; }

      /* ── All sections padding consistency ── */
      section#artists, section#news, section#faq { padding-left: 1.5rem !important; padding-right: 1.5rem !important; }

      /* ── Plakat edge to edge ── */
      .page-pad > div[style*="max-width: 1120px"] { max-width: 100% !important; }

      /* ── FAQ ── */
      section#faq { padding: 1rem 1.5rem 2rem !important; }
      #faq h2 { font-size: clamp(1.8rem, 8vw, 2.5rem) !important; }

      /* ── Plakat ── */
      .page-pad > div > img[alt="Plakat All Star Festival"] { border-radius: 0 !important; }

      /* ── Footer ── */
      .site-footer { padding: 2.5rem 1.5rem !important; }
      .footer-inner { flex-direction: column !important; gap: 2rem !important; align-items: flex-start !important; }
      .footer-inner img { height: 120px !important; margin-left: -35px !important; }
      .footer-nav { gap: 2rem !important; }

      /* ── Artists section ── */
      section#artists { padding: 1.5rem 1rem !important; }
      .artist-card { width: 150px !important; height: 200px !important; flex: 0 0 150px !important; }

      /* ── Instagram ── */
      section#instagram { padding: 0 1rem 1.5rem !important; }

      /* ── Password gate ── */
      #password-gate img { height: 140px !important; }
      #password-gate input, #password-gate button { width: 260px !important; }
    }

    /* ════════════════════════════════
       SMALL PHONES — 480px and below
    ════════════════════════════════ */
    @media (max-width: 480px) {

<!-- ═══════════════════════════════════════════
     PASSWORD GATE
═══════════════════════════════════════════ -->
<div id="password-gate" style="position: fixed; inset: 0; z-index: 9999; background: var(--black); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2rem;">
  <img src="brand_assets/newlogo.png" alt="OSHEE ALL STAR FESTIVAL" style="height: 200px; width: auto;">
  <div style="display: flex; flex-direction: column; align-items: center; gap: 1rem;">
    <input id="gate-input" type="password" placeholder="ENTER PASSWORD" style="
      font-family: 'Anton', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-align: center;
      padding: 0.85rem 2.5rem;
      background: transparent;
      border: 2px solid rgba(255,255,255,0.3);
      color: #fff;
      outline: none;
      width: 300px;
      transition: border-color 0.2s;
    " onfocus="this.style.borderColor='var(--citrine)'" onblur="this.style.borderColor='rgba(255,255,255,0.3)'">
    <button id="gate-btn" onclick="tryGatePassword()" style="
      font-family: 'Anton', sans-serif;
      font-weight: 800;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.75rem 2.5rem;
      background: var(--citrine);
      color: var(--black);
      border: none;
      cursor: pointer;
      width: 300px;
      transition: opacity 0.2s;
    ">ENTER</button>
    <p id="gate-error" style="font-family: 'Anton', sans-serif; font-weight: 600; font-size: 0.8rem; color: #ff4444; letter-spacing: 0.05em; opacity: 0; transition: opacity 0.2s;">WRONG PASSWORD</p>
  </div>
</div>

<script>
  const GATE_HASH = '89f22cac';
  function simpleHash(s) {
    let h = 0;
    for (let i = 0; i < s.length; i++) {
      h = ((h << 5) - h + s.charCodeAt(i)) | 0;
    }
    return (h >>> 0).toString(16);
  }
  const gateInput = document.getElementById('gate-input');
  const gateError = document.getElementById('gate-error');
  function tryGatePassword() {
    if (simpleHash(gateInput.value) === GATE_HASH) {
      document.getElementById('password-gate').style.display = 'none';
      document.getElementById('hamburger-btn').style.display = 'flex';
      sessionStorage.setItem('gate-passed', '1');
      window.scrollTo(0, 0);
      gateInput.blur();
    } else {
      gateError.style.opacity = '1';
      gateInput.style.borderColor = '#ff4444';
      setTimeout(() => { gateError.style.opacity = '0'; gateInput.style.borderColor = 'rgba(255,255,255,0.3)'; }, 2000);
    }
  }
  gateInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') tryGatePassword();
  });
  if (sessionStorage.getItem('gate-passed') === '1') {
    document.getElementById('password-gate').style.display = 'none';
  }
</script>
