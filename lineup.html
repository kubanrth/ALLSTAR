<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINEUP — OSHEE ALL STAR FESTIVAL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Forum&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #0A0C0F;
      --citrine: #EED410;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Forum', serif;
      background: var(--black);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-family: 'Anton', sans-serif;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--citrine);
      margin-bottom: 2rem;
    }
    p {
      font-family: 'Forum', serif;
      font-size: clamp(1.1rem, 2vw, 1.4rem);
      line-height: 1.8;
      color: #fff;
      max-width: 600px;
      opacity: 0.85;
    }
    .hashtag {
      font-family: 'Anton', sans-serif;
      color: var(--citrine);
      font-size: clamp(1.3rem, 2.5vw, 1.6rem);
      letter-spacing: 0.04em;
      margin-top: 1.5rem;
      display: block;
    }
    .back-link {
      font-family: 'Anton', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #fff;
      text-decoration: none;
      border: 2px solid rgba(255,255,255,0.3);
      padding: 0.6rem 1.5rem;
      margin-top: 3rem;
      display: inline-block;
      transition: border-color 0.2s, color 0.2s;
    }
    .back-link:hover { border-color: var(--citrine); color: var(--citrine); }
  </style>
</head>
<body>
  <h1>LINEUP</h1>
  <p>Czołówka polskiego rapu na stadionowej scenie.</p>
  <p style="margin-top: 1rem;">Ogłoszenia artystów niebawem.</p>
  <span class="hashtag">#ALLSTAR_DRAFT</span>
  <a href="index.html" class="back-link">POWRÓT</a>
</body>
</html>
